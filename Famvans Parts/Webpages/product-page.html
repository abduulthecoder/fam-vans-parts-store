<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - Fam Vans Parts Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZmCULaMxtX6wY5gUIU3jv6C5i0jeKla4NKXo8kz3AhiU5T5r+E6ztJQ9f6pG9nK5eQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../Styles/common.css">
    <link rel="stylesheet" href="../Styles/cards.css">
    <link rel="stylesheet" href="../Styles/footer.css">
    <link rel="stylesheet" href="../Styles/products-page.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html" class="logo-link"><img class="logo" src="../Images/FAMparts.png" alt="Fam Vans Parts Logo"></a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li>
                    <div class="cart">
                        <a href="search.html" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
                        <a href="#" class="cart-trigger" aria-label="Shopping Cart"><i class="fa-solid fa-cart-shopping"></i></a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="product-detail-wrapper">
            <div class="product-media">
                <img id="product-image" src="../Images/placeholder.png" alt="Product image" />
            </div>
            <div class="product-info">
                <h1 id="product-title">Product Title</h1>
                <p id="product-sku" class="muted">SKU: <span></span></p>
                <p id="product-price" class="price">$0.00</p>
                <p id="product-desc">Detailed product description will appear here. Compatible with many commercial vans and upfit options.</p>
                <div class="product-actions">
                    <label>Quantity: <input id="qty" type="number" min="1" value="1" /></label>
                    <label>Labor hours: <input id="labor-hours" type="number" min="0" step="0.25" value="0" /></label>
                    <button id="add-to-cart" class="btn">Add to Cart</button>
                </div>
            </div>
        </div>
        <section class="related-products">
            <h2>Related Products</h2>
            <div id="related-list" class="cards-grid"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Fam Vans - The Parts Store. All rights reserved.</p>
    </footer>

    <script>
    // Simple product page script: reads ?id= from URL and provides add-to-cart
    (function(){
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || 'demo-001';
        document.getElementById('product-title').textContent = 'Demo Product ' + id;
        document.getElementById('product-sku').querySelector('span').textContent = id;
        document.getElementById('product-price').textContent = '$199.00';
        document.getElementById('product-desc').textContent = 'High-quality van accessory compatible with multiple models. Includes hardware and installation instructions.';

        document.getElementById('add-to-cart').addEventListener('click', function(){
            const qty = parseInt(document.getElementById('qty').value) || 1;
            const labor = parseFloat(document.getElementById('labor-hours').value) || 0;
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            // see if same item+labor exists
            const existing = cart.find(i=>i.id===id && i.laborHours===labor);
            if(existing){ existing.qty += qty; }
            else {
                cart.push({
                  id,
                  title: document.getElementById('product-title').textContent,
                  price: 199.00,
                  qty,
                  laborHours: labor,
                  laborRate: 225
                });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Added to cart');
        });
    })();
    </script>

    <!-- Cart Popover -->
    <div class="cart-popover-overlay"></div>
    <div class="cart-popover">
      <div class="cart-popover-header">
        <h2>Shopping Cart</h2>
        <button class="cart-popover-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="cart-popover-contents"></div>
      <div class="cart-popover-footer">
        <div class="cart-popover-total"><span>Total:</span><span>$0.00</span></div>
        <button class="checkout-btn">Proceed to Checkout</button>
        <button class="clear-cart-btn">Clear Cart</button>
      </div>
    </div>

    <script src="../Scripts/cartPopover.js"></script>
</body>
</html>
