<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Fam Vans Parts Store</title>
    <link rel="icon" type="image/x-icon" href="../Images/fvlogo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZmCULaMxtX6wY5gUIU3jv6C5i0jeKla4NKXo8kz3AhiU5T5r+E6ztJQ9f6pG9nK5eQ==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <script src="https://kit.fontawesome.com/037d909396.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../Styles/common.css">
    <link rel="stylesheet" href="../Styles/cards.css">
    <link rel="stylesheet" href="../Styles/footer.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="index.html" class="logo-link"><img class="logo" src="../Images/FAMparts.png" alt="Fam Vans Parts Logo"></a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li>
                    <div class="cart">
                        <a href="search.html" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
                        <a href="#" class="cart-trigger" aria-label="Shopping Cart"><i class="fa-solid fa-truck"></i></a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <main style="padding: 40px 20px;">
        <h1 style="text-align:center;">Contact Us</h1>
        <div class="contact-grid">
            <div class="card">
                <h3>Visit Our Store</h3>
                <p>10900 Kalama River Ave, Fountain Valley, CA</p>
                <p>Mon-Fri 8am - 5pm</p>
            </div>
            <div class="card">
                <h3>Call Us</h3>
                <p><a href="tel:+1(714) 274-1148">(714) 274-1148</a></p>
                <h3>Email</h3>
                <p><a href="mailto: parts@famvans.com">parts@famvans.com</a></p>
            </div>
            <div class="card">
                <h3>Send a Message</h3>
                <form id="contact-form">
                    <label>Name<br><input type="text" id="c-name" required></label><br>
                    <label>Email<br><input type="email" id="c-email" required></label><br>
                    <label>Message<br><textarea id="c-message" rows="4" required></textarea></label><br>
                    <button type="submit" class="btn">Send Message</button>
                </form>
                <div id="contact-msg" style="margin-top:8px;"></div>
            </div>
        </div>
    </main>

    <script>
    document.getElementById('contact-form').addEventListener('submit', function(e){
        e.preventDefault();
        const name = document.getElementById('c-name').value.trim();
        const email = document.getElementById('c-email').value.trim();
        const message = document.getElementById('c-message').value.trim();
        if(!name||!email||!message){ document.getElementById('contact-msg').textContent='Please complete the form.'; return; }
        // In a real app, send via API. Here provide mailto fallback and confirmation.
        const mailto = `mailto:info@famvansparts.com?subject=${encodeURIComponent('Contact from '+name)}&body=${encodeURIComponent(message+'\n\nFrom: '+name+' <'+email+'>')}`;
        document.getElementById('contact-msg').innerHTML = 'Message prepared. <a href="'+mailto+'">Click here to send via your email</a> or copy the message.';
    });
    </script>

    <!-- Cart Popover -->
    <div class="cart-popover-overlay"></div>
    <div class="cart-popover">
      <div class="cart-popover-header">
        <h2>Shopping Cart</h2>
        <button class="cart-popover-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="cart-popover-contents"></div>
      <div class="cart-popover-footer">
        <div class="cart-popover-total"><span>Total:</span><span>$0.00</span></div>
        <button class="checkout-btn">Proceed to Checkout</button>
        <button class="clear-cart-btn">Clear Cart</button>
      </div>
    </div>

    <footer>
        <p>&copy; 2026 Fam Vans - The Parts Store. All rights reserved.</p>
    </footer>

    <script src="../Scripts/cartPopover.js"></script>
</body>
</html>
