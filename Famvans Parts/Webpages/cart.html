<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Fam Vans Parts Store</title>
    <link rel="icon" type="image/x-icon" href="../Images/fvlogo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZmCULaMxtX6wY5gUIU3jv6C5i0jeKla4NKXo8kz3AhiU5T5r+E6ztJQ9f6pG9nK5eQ==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <script src="https://kit.fontawesome.com/037d909396.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../Styles/common.css">
    <link rel="stylesheet" href="../Styles/cards.css">
    <link rel="stylesheet" href="../Styles/footer.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="index.html" class="logo-link"><img class="logo" src="../Images/FAMparts.png" alt="Fam Vans Parts Logo"></a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li>
                    <div class="cart">
                        <a href="search.html" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
                        <a href="#" class="cart-trigger" aria-label="Shopping Cart"><i class="fa-solid fa-truck"></i></a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <main style="padding: 40px 20px;">
        <h1 style="text-align:center;">Your Cart</h1>
        <div style="max-width:900px;margin:0 auto;">
            <div id="cart-contents"></div>
            <div style="text-align:right;margin-top:12px;"><button id="clear-cart" class="btn">Clear Cart</button></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Fam Vans - The Parts Store. All rights reserved.</p>
    </footer>

    <script>
    function renderCart(){
        const out = document.getElementById('cart-contents');
        const cart = JSON.parse(localStorage.getItem('cart')||'[]');
        if(!cart.length){ out.innerHTML = '<p>Your shopping cart is empty.</p>'; return; }
        out.innerHTML = cart.map((i,idx)=>{
            const laborCost = (i.laborHours||0) * (i.laborRate||0);
            const total = ((i.price||0) + laborCost) * i.qty;
            return `<div class="card"><h3>${i.title}</h3><p>SKU: ${i.id}</p><p>Qty: ${i.qty}</p><p>Retail: $${(i.price||0).toFixed(2)}</p>${i.laborHours?`<p>Labor: ${i.laborHours}h @ $${(i.laborRate||0).toFixed(2)}/h = $${laborCost.toFixed(2)}</p>`:''}<p>Subtotal: $${total.toFixed(2)}</p><p><button class="remove" data-idx="${idx}">Remove</button></p></div>`;
        }).join('');
        document.querySelectorAll('.remove').forEach(b=> b.addEventListener('click', function(){
            const idx = parseInt(this.dataset.idx); const cart = JSON.parse(localStorage.getItem('cart')||'[]');
            if(!isNaN(idx) && idx>=0){ cart.splice(idx,1);} localStorage.setItem('cart', JSON.stringify(cart)); renderCart();
        }));
    }
    document.getElementById('clear-cart').addEventListener('click', function(){ localStorage.removeItem('cart'); renderCart(); });
    renderCart();
    </script>

    <!-- Cart Popover -->
    <div class="cart-popover-overlay"></div>
    <div class="cart-popover">
      <div class="cart-popover-header">
        <h2>Shopping Cart</h2>
        <button class="cart-popover-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="cart-popover-contents"></div>
      <div class="cart-popover-footer">
        <div class="cart-popover-total"><span>Total:</span><span>$0.00</span></div>
        <button class="checkout-btn">Proceed to Checkout</button>
        <button class="clear-cart-btn">Clear Cart</button>
      </div>
    </div>

    <footer>
        <p>&copy; 2026 Fam Vans - The Parts Store. All rights reserved.</p>
    </footer>

    <script src="../Scripts/cartPopover.js"></script>
</body>
</html>
